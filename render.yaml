databases:
  - name: mooday-db
    plan: free
    databaseName: mooday
    user: mooday

services:
  - type: redis
    name: mooday-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: mooday
    plan: free
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mooday-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mooday-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://mooday.onrender.com
